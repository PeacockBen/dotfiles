backend = "glx";

corner-radius = 10;

animations = (
  {
    # THIS is the magic setting for the "stretch"
    triggers = ["geometry"];
    preset = "geometry-change";
  }
);

# Window opacity

inactive-opacity = 0.90;
active-opacity = 0.90;
frame-opacity = 0.90;
opacity-rule = ["100:fullscreen"];

# Window background blur

blur: {
  method = "dual_kawase";
  strength = 1;
  background = false;
  background-frame = false;
  background-fixed = false;
}

# Window shadows

shadow = true;
shadow-radius = 20;
shadow-opacity = 0.5;
shadow-offset-x = -19;
shadow-offset-y = -19;

# --- Fading (The default smooth transitions) ---
fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;
no-fading-openclose = false;
fade-exclude = [
  "class_g = 'eww-sidebar'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'"
];
